body:
  text: 今有一十八分之一十二問約之得幾何答曰三分之二術曰置十八分在下一十二分在上副置二位以少減多等數得六為法約之即得今有三分之一五分之二問合之二得幾何答曰一十五分之十一術曰置三分五分在右方之一之二在左方母互乗子五分之二得六三分之一得五并之得一十一為實右方二母相乗得一十五為法不滿法以法命之即得今有九分之八減其五分之一問餘幾何答曰四十五分之三十一術曰置九分五分在右方之八之一在左方母互乗子五分之一得九九分之八得四十以少減多餘三十一為實母相乗得四十五為法不滿法以法命之即得今有三分之一三分之二四分之三問減多益少幾何而平答曰減四分之三者二三分之二者一并以益三分之一而各平于一十二分之七術曰置三分三分四分在右方之一之二之三在左方母互乗子副并得六十三置右為平實母相乗得三十六為法以列數三乗未并者及法等數得九約訖減四分之三者二減三分之二者一并以益三分之一各平于一十二分之七今有粟一斗問為糲米幾何答曰六升術曰置粟一斗十升以糲米率三十乗之得三百升為實以粟率五十為法除之即得今有粟二斗一升問為粺米幾何答曰一斗一升五十分升之一十七術曰置粟數二十一升以粺米率二十七乗之得五百六十七升為實以粟率五十為法除之不盡以法而命分今有粟四斗五升問為糳米幾何答曰二斗一升五分升之三術曰置粟四十五升以二約糳米率二十四得一十二乗之得五百四十升為實以二約粟率五十得二十五為法除之不盡以等數約之而命分今有粟七斗九升問為御米幾何答曰三斗三升一合八勺術曰置七斗九升以御米率二十一乗之得一千六百五十九升為實以粟率五十除之即得今有屋基南北三丈東西六丈欲以甎砌之凡積二尺用甎五枚問計幾何答曰四千五百枚術曰置東西六丈以南北三丈乗之得一千八百尺以五乗之得九千尺以二除之即得今有圓窖下周二百八十六尺深三丈六尺問受粟幾何答曰一十五萬一千四百七十四斛七升二十七分升之一十一術曰置周二百八十六尺自相乗得八萬一千七百九十六尺以深三丈六尺乗之得二百九十四萬四千六百五十六以一十二除之得二十四萬五千三百八十八尺以斛法一尺六寸二分除之即得今有方窖廣四丈六尺長五丈四尺深三丈五尺問受粟幾何答曰五萬三千六百六十六斛六斗六升三分升之二術曰置廣四丈六尺長五丈四尺相乗得二千四百八十四尺以深三丈五尺乗之得八萬六千九百四十尺以斛法一尺六寸二分除之即得今有圓窖周五丈四尺深一丈八尺問受粟幾何答曰二千七百斛術曰先置周五丈四尺相乗得二千九百一十六尺以深一丈八尺乗之得五萬二千四百八十八尺以一十二除之得四千三百七十四尺以斛法一尺六寸二分除之即得今有圓田周三百步徑一百步問得田幾何答曰三十一畆奇六十步術曰先置周三百步半之得一百五十步又置徑一百步半之得五十步相乗得七千五百步以畆法二百四十步除之即得又術曰周自相乗得九萬步以十二除之得七千五百步以畆法除之得畆數又術曰徑自乗得一萬以三乗之得三萬步四除之得七千五百步以畆法除之得畆數今有方田桑生中央從角至桑一百四十七步問為田幾何答曰一頃八十三畆奇一百八十步術曰置角至桑一百四十七步倍之得二百九十四步以五乗之得一千四百七十步以七除之得二百一十步自相乗得四萬四千一百步以二百四十步除之即得今有木方三尺高三尺欲方五寸作枕一枚問得幾何答曰二百一十六枚術曰置方三尺自相乗得九尺以高三尺乗之得二十七尺以一尺木八枕乗之即得今有索長五千七百九十四步欲使作方問幾何答曰一千四百四十八步三尺術曰置索長五千七百九十四步以四除之得一千四百四十八步餘二步以六因之得一丈二尺以四除之得三尺通計即得今有堤下廣五丈上廣三丈高二丈長六十尺欲以一千尺作一方問計幾何答曰四十八方術曰置堤上廣三丈下廣五丈并之得八丈半之得四丈以二丈乗之得八百尺以長六十尺乗之得四萬八千以一千尺除之案除原本訛作乗今改正即得今有溝廣十丈深五丈長二十丈欲以千尺作一方問得幾何答曰一千方術曰置廣一十丈以深五丈乗之得五千尺又以長二十丈乘之得一百萬尺以一千除之即得今有積二十三萬四千五百六十七歩問為方幾何答曰四百八十四歩九百六十八分歩之三百一十一術曰置積二十三萬四千五百六十七歩為實次借一算為下法歩之超一位至百而止上商置四百于實之上案上商原本脫上字今補副置四萬于實之下下法之上名為方法命上商四百除實除訖倍方法方法一退案原本脫方法二字今補下法再退復置上商八十以次前商副置八百于方法之下下法之上名為亷法方廉各命上商八十以除實案原本脫實字今補除訖案原本脫除字今補倍廉法從方法方法一退下法再退復置上商四以次前副置四于方法之下下法之上名曰隅法方廉隅各命上商四以除實除訖倍隅法從方法案原本訛此六字今據術補上商得四百八十四下法得九百六十八不盡三百一十一是為方四百八十四歩九百六十八分歩之三百一十一今有積三萬五千歩問為圓幾何答曰六百四十八歩一千二百九十六分歩之九十六案六分歩原本訛作七分脫歩字今補正術曰置積三萬五千歩以一十二乘之得四十二萬為實次借一算為下法歩之超一位至百而止上商置六百于實之上副置六萬于實之下下法之上名為方法命上商六百除實除訖倍方法方法一退下法再退復置上商四十以次前商副置四百于方法之下下法之上名為廉法方廉各命上商四十以除實案原本脫四十二字今補除訖倍廉法從方法方法一退下法再退復置上商八次前商副置八于方法之下下法之上名為隅法方廉隅各命上商八以除實除訖倍隅法從方法上商得六百四十八案原本脱得字今補下法得一千二百九十六案六原本訛作七今改正不盡九十六是為方六百四十八歩一千二百九十六分歩之九十六案九十六分原本訛作九十七分今改正今有邱田周六百三十九歩徑三百八十歩問為田幾何答曰二頃五十二畆二百二十五歩術曰半周得三百一十九歩五分半徑得一百九十歩二位相乗得六萬七百五歩以畆法除之即得今有築城上廣二丈下廣五丈四尺高三丈八尺長五千五百五十尺秋程人功三百尺問須功幾何答曰二萬六千一十一功術曰并上下廣得七十四尺半之得三十七尺以高乗之得一千四百六尺又以長乗之得積七百八十萬三千三百尺以秋程人功三百尺除之即得今有穿渠長二十九里一百四步上廣一丈二尺六寸下廣八尺深一丈八尺秋程人功三百尺問須功幾何答曰三萬二千六百四十五功案原本訛作三萬二百六十五人今據術改正不盡六十九尺六寸術曰置里數以三百步乗之内零步六之得五萬二千八百二十四尺并上下廣得二丈六寸半之以深乗之得一百八十五尺四寸以長乗得九百七十九萬三千五百六十九尺六寸以人功三百尺除之即得今有錢六千九百三十欲令二百一十六人作九分分之八十一人人與二分七十二人人與三分六十三人人與四分問三種各得幾何答曰二分人得錢二十二三分人得錢三十三四分人得錢四十四術曰先置八十一人于上七十二人次之六十三人在下頭位以二乗之得一百六十二次位以三乗之得二百一十六下位以四乗之得二百五十二副并三位得六百三十為法又置錢六千九百三十為三位頭位以一百六十二乗之得一百一十二萬二千六百六十又以二百一十六乗中位得一百四十九萬六千八百八十又以二百五十二乗下位得一百七十四萬六千三百六十各為實以法六百三十各除之頭位得一千七百八十二中位得二千三百七十六下位得二千七百七十二各以人數除之即得今有五等諸侯共分橘子六十顆人别加三顆問五人各得幾何答曰公一十八顆侯一十五顆伯一十二顆子九顆男六顆術曰先置人數别加三顆于下次六顆次九顆次一十二顆上十五顆副并之得四十五以減六十顆餘人數除之得人三顆各加不并者上得一十八為公分次得一十五為侯分次得一十二為伯分次得九為子分下得六為男分今有甲乙丙三人持錢甲語乙丙各將公等所持錢半以益我錢成九十乙復語甲丙各將公等所持錢半以益我錢成七十丙復語甲乙各將公等所持錢半以益我錢成五十六問三人元持錢各若干答曰甲七十二乙三十二丙四術曰先置三人所語為位以三乗之各為積甲得二百七十乙得二百一十丙得一百六十八各半之甲得一百三十五乙得一百五丙得八十四又置甲九十乙七十丙五十六各半之以甲乙減丙以甲丙減乙以乙丙減甲即各得元數今有女子善織日自倍五日織通五尺問日織幾何答曰初日織一寸三十一分寸之一十九次日織三寸三十一分寸之七次日織六寸三十一分寸之一十四次日織一尺二寸三十一分寸之二十八次日織二尺五寸三十一分寸之二十五術曰各置列衰副并得三十一為法以五尺乗未并者各自為實實如法而一即得今有人盜庫絹不知所失幾何但聞草中分絹人得六匹盈六匹人得七匹不足七匹問人絹各幾何答曰賊一十三人絹八十四匹術曰先置人得六匹于右上盈六匹于右下後置人得七匹于左上不足七匹于左下維乗之所得并之為絹并盈不足為人
