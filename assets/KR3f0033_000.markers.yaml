  - {type: variant, offset: 15, length: 209, content: 經緯羣生之元首五常之本末陰陽之父母星辰之建號三光之表裏五行之準平四時之終始萬物之祖宗六藝之綱紀稽羣倫之聚散攷二氣之降升推寒暑之迭運步逺近之殊同觀天道精微之兆基察地理從横之長短采神祇之所在極成敗之符驗窮道徳之理究性命之情立規矩準方圓謹法度約尺丈立權衡平重輕剖毫釐析泰絫厯億載而不朽施八極而無疆散之不可勝究斂之不盈掌握嚮之者富有餘背之者貧且窶心開者幼沖而即悟意閉者皓首而難精夫欲學之者必務量能揆已志在所専如是則焉有不成者哉, WYG: 屬}
