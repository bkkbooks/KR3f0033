body:
  text: 今有甲乙丙丁戊己庚辛壬九家共輸租甲出三十五斛乙出四十六斛丙出五十七斛丁出六十八斛戊出七十九斛己出八十斛庚出一百斛辛出二百一十斛壬出三百二十五斛凡九家共輸租一千斛僦運直折二百斛外問家各幾何答曰甲二十八斛乙三十六斛八斗丙四十五斛六斗丁五十四斛四斗戊六十三斛二斗己六十四斛庚八十斛辛一百六十八斛壬二百六十斛術曰置甲出三十五斛以四乘之得一百四十斛以五除之得二十八斛乙出四十六斛以四乘之得一百八十四斛以五除之得三十六斛八斗丙出五十七斛以四乘之得二百二十八斛以五除之得四十五斛六斗丁出六十八斛以四乘之得二百七十二斛以五除之得五十四斛四斗戊出七十九斛以四乘之得三百一十六斛以五除之得六十三斛二斗己出八十斛以四乘之得三百二十斛以五除之得六十四斛庚出一百斛以四乘之得四百斛以五除之得八十斛辛出二百一十斛以四乘之得八百四十斛以五除之得一百六十八斛壬出三百二十五斛以四乘之得一千三百斛以五除之得二百六十斛今有丁一千五百萬出兵四十萬問幾丁科一兵答曰三十七丁五分術曰置丁一千五百萬為實以兵四十萬為法實如法即得今有平地聚粟下周三丈六尺高四尺五寸問粟幾何答曰一百斛術曰置周三丈六尺自相乘得一千二百九十六尺以高四尺五寸乘之得五千八百三十二尺以三十六除之得一百六十二尺以斛法一尺六寸二分除之即得今有佛書凡二十九章章六十三字問字幾何答曰一千八百二十七術曰置二十九章以六十三字乘之即得今有棊局方一十九道問用棊幾何答曰三百六十一術曰置一十九道自相乘之即得今有租九萬八千七百六十二斛欲以一車載五十斛問用車幾何答曰一千九百七十五乘奇一十二斛術曰置租九萬八千七百六十二斛為實以一車所載五十斛為法實如法即得今有丁九萬八千七百六十六凡二十五丁出一兵問兵幾何答曰三千九百五十人奇一十六丁術曰置丁九萬八千七百六十六為實以二十五為法實如法即得今有絹七萬八千七百三十二匹令一百六十二人分之問人得幾何答曰四百八十六匹術曰置絹七萬八千七百三十二匹為實以一百六十二人為法實如法即得今有綿九萬一千一百三十五斤給與三萬六千四百五十四户問户得幾何答曰二斤八兩術曰置九萬一千一百三十五斤為實以三萬六千四百五十四户為法除之得二斤不盡一萬八千二百二十七斤以一十六乘之得二十九萬一千六百三十二兩以户除之即得今有粟三千九百九十九斛九斗六升凡粟九斗易豆一斛問計豆幾何答曰四千四百四十四斛四斗術曰置粟三千九百九十九斛九斗六升為實以九斗為法實如法即得今有粟二千三百七十四斛斛加三升問共粟幾何答曰二千四百四十五斛二斗二升術曰置粟二千三百七十四斛以一斛三升乘之即得今有粟三十六萬九千九百八十斛七斗在倉九年年斛耗三升問一年九年各耗幾何答曰一年耗一萬一千九十九斛四斗二升一合九年耗九萬九千八百九十四斛七斗八升九合術曰置三十六萬九千九百八十斛七斗以三升乘之得一年之耗又以九乘之即九年之耗今有貸與人絲五十七斤限嵗出息一十六斤問斤息幾何答曰四兩五十七分兩之二十八術曰列限息絲一十六斤以一十六兩乘之得二百五十六兩以貸絲五十七斤除之不盡約之即得今有三人共車二車空二人共車九人步問人與車各幾何答曰一十五車三十九人術曰置二人以三乘之得六加步者九人得車一十五欲知人者以二乘車加九人即得今有粟一十二萬八千九百四十斛九斗三合出與人買絹一匹直粟三斛五斗七升問絹幾何答曰三萬六千一百一十七匹三丈六尺術曰置粟一十二萬八千九百四十斛九斗三合為實以三斛五斗七升為法除之得匹餘四十之所得又以法除之即得今有婦人河上蕩杯津吏問曰杯何以多婦人曰家有客津吏曰客幾何婦人曰二人共飯三人共羮四人共肉凡用杯六十五不知客幾何答曰六十人術曰置六十五杯以十二乘之得七百八十以十三除之即得今有木不知長短引繩度之餘繩四尺五寸屈繩量之不足一尺問幾何答曰六尺五寸術曰置餘繩四尺五寸加不足一尺共五尺五寸倍之得一丈一尺減餘四尺五寸即得今有器中米不知其數前人取半中人三分取一後人四分取一餘米一斗五升問米幾何答曰六斗術曰置餘米一斗五升以六乘之得九斗以二除之得四斗五升以四乘之得一斛八斗以三除之即得今有黃金一斤直錢一十萬問兩直幾何答曰六千二百五十錢術曰置錢一十萬以一十六兩除之即得今有錦一匹直錢一萬八千問丈尺寸各直幾何答曰丈四千五百錢尺四百五十錢寸四十五錢術曰置錢一萬八千以四除之得一丈之直一退再退得尺寸之直今有地長一千步廣五百步尺有鶉寸有鷃問鶉鷃各幾何答曰鶉一千八百萬鷃一億八千萬術曰置長一千步以廣五百步乘之得五十萬以三十六乘之得一千八百萬尺即得鶉數上十之即得鷃數今有六萬口上口三萬人日食九升中口二萬人日食七升下口一萬人日食五升問上中下口共食幾何答曰四千六百斛術曰各置口數以日食之數乘之所得并之即得今有方物一束外周一市有三十二枚問積幾何答曰八十一枚術曰重置二位左位減八餘加右位至盡虛加一即得今有竿不知長短度其影得一丈五尺别立一表長一尺五寸影得五寸問竿長幾何答曰四丈五尺術曰置竿影一丈五尺以表長一尺五寸乘之上十之得二十二丈五尺以表影五寸除之即得今有物不知其數三三數之賸二五五數之賸三七七數之賸二問物幾何答曰二十三術曰三三數之賸二置一百四十五五數之賸三置六十三七七數之賸二置三十并之得二百三十三以二百一十減之即得凡三三數之賸一則置七十五五數之賸一則置二十一七七數之賸一則置十五一百六以上以一百五減之即得今有獸六首四足禽二首二足上有七十六首下有四十六足問禽獸各幾何答曰八獸七禽術曰倍足以減首餘半之即獸以四乘獸減足餘半之即禽今有甲乙二人持錢各不知數甲得乙中半可滿四十八乙得甲大半亦滿四十八問甲乙二人元持錢各幾何答曰甲持錢三十六乙持錢二十四術曰如方程求之置二甲一乙錢九十六于右方置二甲三乙錢一百四十四于左方以右方二乘左方上得四中得六下得二百八十八錢以左方二乘右方上得四中得二下得九十六案近刻脫此十八字今據術補以右行再減左行左上空中餘四乙為法下餘九十六錢為實上法下實得二十四錢為乙錢以減右下九十六餘七十二為實以右上二甲為法上法下實得三十六為甲錢也今有百鹿入城家取一鹿不盡又三家共一鹿適盡問城中家幾何答曰七十五家術曰以盈不足取之假令七十二家鹿不盡四令之九十家鹿不足二十置七十二于右上盈四于右下置九十于左上不足二十于左下維乘之所得并為實并盈不足為法除之即得今有三雞共啄粟一千一粒雛啄一母啄二翁啄四主責本粟三雞主各償幾何答曰雞雛主一百四十三雞母主二百八十六雞翁主五百七十二術曰置粟一千一粒為實副并三雞所啄粟七粒為法除之得一百四十三粒為雞雛主所償之數遞倍之即得母翁主所償之數今有雉兔同籠上有三十五頭下有九十四足問雉兔各幾何答曰雉二十三兔一十二術曰上置三十五頭下置九十四足半其足得四十七以少減多再命之上三除下三上五除下五下有一除上一下有二除上二即得又術曰上置頭下置足半其足以頭除足以足除頭即得今有九里渠三寸魚頭頭相次問魚得幾何答曰五萬四千術曰置九里以三百步乘之得二千七百步又以六尺乘之得一萬六千二百尺上十之得一十六萬二千寸以魚三寸除之即得今有長安洛陽相去九百里車輪一匝一丈八尺欲自洛陽至長安問輪匝幾何答曰九萬匝術曰置九百里以三百步乘之得二十七萬步又以六尺乘之得一百六十二萬尺以車輪一丈八尺為法除之即得今有出門望見九堤堤有九木木有九枝枝有九巢巢有九禽禽有九雛雛有九毛毛有九色問各幾何答曰木八十一枝七百二十九巢六千五百六十一禽五萬九千四十九雛五十三萬一千四百四十一毛四百七十八萬二千九百六十九色四千三百四萬六千七百二十一術曰置九堤以九乘之得木之數又以九乘之得枝之數又以九乘之得巢之數又以九乘之得禽之數又以九乘之得雛之數又以九乘之得毛之數又以九乘之得色之數今有三女長女五日一歸中女四日一歸少女三日一歸問三女幾何日相㑹答曰六十日術曰置長女五日中女四日少女三日于右方各列一算于左方維乘之各得所到數長女十二到中女十五到少女二十到又各以歸日乘到數即得今有孕婦行年二十九嵗難九月未知所生答曰生男術曰置四十九加難月減行年所餘以天除一地除二人除三四時除四五行除五六律除六七星除七八風除八九州除九其不盡者奇則為男耦則為女
