body:
  text: 度之所起起于忽欲知其忽蠶吐絲為忽十忽為一絲十絲為一毫十毫為一氂十氂為一分十分為一寸十寸為一尺十尺為一丈十丈為一引五十引為一端四十尺為一匹六尺為一步二百四十步為一畆三百步為一里稱之所起起于黍十黍為一絫十絫為一銖二十四銖為一兩十六兩為一觔三十觔為一鈞四鈞為一石量之所起起于粟六粟為一圭十圭為一撮十撮為一抄十抄為一勺十勺為一合十合為一升十升為一斗十斗為一斛斛得六千萬粟所以得知者六粟為一圭十圭六十粟為一撮十撮六百粟為一抄十抄六千粟為一勺十勺六萬粟為一合十合六十萬粟為一升十升六百萬粟為一斗十斗六千萬粟為一斛十斛六億粟百斛六兆粟千斛六京粟萬斛六陔粟十萬斛六秭粟百萬斛六穰粟千萬斛六溝粟萬萬斛為一億斛六澗粟十億斛六正粟百億斛六載粟凡大數之法萬萬曰億萬萬億曰兆萬萬兆曰京萬萬京曰陔萬萬陔曰秭萬萬秭曰穰萬萬穰曰溝萬萬溝曰澗萬萬澗曰正萬萬正曰載周三徑一方五邪七見邪求方五之七而一見方求邪七之五而一黄金方寸重一觔白銀方寸重一十四兩玉方寸重一十兩銅方寸重七兩半鉛方寸重九兩半鐵方寸重七兩石方寸重三兩凡算之法先識其位一從十横百立千僵千十相望萬百相當案萬百原本訛作百萬今據夏侯陽算經改正凡乗之法重置其位上下相觀頭位有十步至十有百步至百有千步至千以上命下所得之數列于中位言十即過不滿自如頭位乗訖者先去之下位乗訖者則俱退之六不積五不隻上下相乗至盡則已凡除之法與乗正異乗得在中央除得在上方假令六為法百為實以六除百當進之二等令在正百下以六除一則法多而實少不可除故當退就十位以法除實言一六而折百為四十故可除若實多法少自當百之不當復退故或步法十者置于十位百者置于百位頭位有空絶者法退二位餘法皆如乗時實有餘者以法命之以法為母實餘為子以粟求糲米三之五而一以糲米求粟五之三而一以糲米求飯五之二而一以粟米求糲飯六之四而一以糲飯求糲米二之五而一以糳米求飯八之四而一十分減一者以二乗二十除減二者以四乗二十除減三者以六乗二十除減四者以八乗二十除減五者以十乗二十除減六者以十二乗二十除減七者以十四乗二十除減八者以十六乗二十除減九者以十八乗二十除九分減一者以二乗十八除八分減一者以二乗十六除七分減一者以二乗十四除六分減一者以二乗十二除五分減一者以二乗十除九九八十一自相乗得幾何答曰六千五百六十一術曰重置其位以上八呼下八八八六十四即下六千四百于中位以上八呼下一一八如八即于中位下八十退下位一等收上頭位八十案原本脫上字今補以上位一案上位原本訛作頭位今改正呼下八一八如八即于中位下八十以上一呼下一一一如一即于中位下一上下位俱收中位即得六千五百六十一六千五百六十一九人分之問人得幾何答曰七百二十九術曰先置六千五百六十一于中位為實下列九人為法上頭位置七百案原本脫上字今補以上七呼下九七九六十三即除中位六千三百退下位一等即上位置二十案上位原本訛作頭位今改正以上二呼下九二九一十八即除中位一百八十又更退下位一等即上位更置九案上位原本亦訛作頭位今改正即以上九呼下九九九八十一即除中位八十一中位竝盡收下位頭位所得即人之所得自八八六十四至一一如一竝準此八九七十二自相乗得五千一百八十四八人分之人得六百四十八七九六十三自相乗得三千九百六十九七人分之人得五百六十七六九五十四自相乗得二千九百一十六六人分之人得四百八十六五九四十五自相乗得二千二十五五人分之人得四百五四九三十六自相乗得一千二百九十六四人分之人得三百二十四三九二十七自相乗得七百二十九三人分之人得二百四十三二九一十八自相乗得三百二十四二人分之人得一百六十二一九如九自相乗得八十一一人得八十一右九九一條得四百五自相乗得一十六萬四千二十五九人分之人得一萬八千二百二十五八八六十四自相乗得四千九十六八人分之人得五百一十二七八五十六自相乗得三千一百三十六七人分之人得四百四十八六八四十八自相乗得二千三百四六人分之人得三百八十四五八四十自相乗得一千六百五人分之人得三百二十四八三十二自相乗得一千二十四四人分之人得二百五十六三八二十四自相乗得五百七十六三人分之人得一百九十二二八十六自相乗得二百五十六二人分之人得一百二十八一八如八自相乗得六十四一人得六十四右八八一條得二百八十八自相乗得八萬二千九百四十四八人分之人得一萬三百六十八七七四十九自相乗得二千四百一七人分之人得三百四十三六七四十二自相乗得一千七百六十四六人分之人得二百九十四五七三十五自相乗得一千二百二十五五人分之人得二百四十五四七二十八自相乗得七百八十四四人分之人得一百九十六三七二十一自相乗得四百四十一三人分之人得一百四十七二七一十四自相乗得一百九十六二人分之人得九十八一七如七自相乗得四十九一人得四十九右七七一條得一百九十六自相乗得三萬八千四百一十六七人分之人得五千四百八十八六六三十六自相乗得一千二百九十六六人分之人得二百一十六五六三十自相乗得九百五人分之人得一百八十四六二十四自相乗得五百七十六四人分之人得一百四十四三六一十八自相乗得三百二十四三人分之人得一百八二六一十二自相乗得一百四十四二人分之人得七十二一六如六自相乗得三十六一人得三十六右六六一條得一百二十六自相乗得一萬五千八百七十六六人分之人得二千六百四十六五五二十五自相乗得六百二十五五人分之人得一百二十五四五二十自相乗得四百四人分之人得一百三五一十五自相乗得二百二十五三人分之人得七十五二五一十自相乗得一百二人分之人得五十一五如五自相乗得二十五一人得二十五右五五一條得七十五自相乗得五千六百二十五五人分之人得一千一百二十五四四一十六自相乗得二百五十六四人分之人得六十四三四一十二自相乗得一百四十四三人分之人得四十八二四如八自相乗得六十四二人分之人得三十二一四如四自相乗得一十六一人得一十六右四四一條得四十自相乗得一千六百四人分之人得四百三三如九自相乗得八十一三人分之人得二十七二三如六自相乗得三十六二人分之人得一十八一三如三自相乗得九一人得九右三三一條得一十八自相乗得三百二十四三人分之人得一百八二二如四自相乗得一十六二人分之人得八一二如二自相乗得四一人得四右二二一條得六自相乗得三十六二人分之人得一十八一一如一自相乗得一一乗不長右從九九至一一總成一千一百五十五自相乗得一百三十三萬四千二十五九人分之人得一十四萬八千二百二十五以九乗一十二得一百八六人分之人得一十八以二十七乗三十六得九百七十二一十八人分之人得五十四以八十一乗一百八得八千七百四十八五十四人分之人得六十二以二百四十三乗三百二十四得七萬八千七百三十二一百六十二人分之人得四百八十六以七百二十九乗九百七十二得七十萬八千五百八十八四百八十六人分之人得一千四百五十八以二千一百八十七乗二千九百一十六得六百三十七萬七千二百九十二一千四百五十八人分之人得四千三百七十四以六千五百六十一乗八千七百四十八得五千七百三十九萬五千六百二十八四千三百七十四人分之人得一萬三千一百二十二以一萬九千六百八十三乗二萬六千二百四十四得五億一千六百五十六萬六百五十二一萬三千一百二十二人分之人得三萬九千三百六十六以五萬九千四十九乗七萬八千七百三十二得四十六億四千九百四萬五千八百六十八三萬九千三百六十六人分之人得一十一萬八千九十八以一十七萬七千一百四十七乗二十三萬六千一百九十六得四百一十八億四千一百四十一萬二千八百一十二一十一萬八千九十八人分之人得三十五萬四千二百九十四以五十三萬一千四百四十一乗七十萬八千五百八十八得三千七百六十五億七千二百七十一萬五千三百八三十五萬四千二百九十四人分之人得一百六萬二千八百八十二
