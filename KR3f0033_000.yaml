front:
  text: 孫子算經原序孫子曰夫算者天地之經緯羣生之元首五常之本末陰陽之父母星辰之建號三光之表裏五行之準平四時之終始萬物之祖宗六藝之綱紀稽羣倫之聚散考二氣之降升推寒暑之迭運步逺近之殊同觀天道精微之兆基察地理從橫之長短采神祇之所在極成敗之符驗窮道德之理究性命之情立規矩準方圓謹法度約尺丈立權衡平重輕剖毫釐析泰絫厯億載而不朽施八極而無疆散之不可勝究斂之不盈掌握嚮之者富有餘背之者貧且窶心開者幼沖而即悟意閉者皓首而難精夫欲學之者必務量能揆已志在所専如是則焉有不成者哉
  hash: sha256:bb6a8a68ed91f468847b8aef3bd36c3ed50f19d4d4000670822e208469a939df
  markers:
  - {type: 'tls:head', offset: 0, content: '', id: KR3f0033_WYG_000-d12head.s1}
body:
  text: 提要臣等謹案隋經籍志有孫子算經二卷不著其名亦不著其時代唐藝文志稱李淳風注甄鸞孫子算經三卷于孫子上冠以甄鸞蓋如淳風之注周髀算經因鸞所注更加辨論也隋書論審度引孫子算術蠶所生吐絲為忽十忽為秒十秒為毫十毫為氂十氂為分本書乃作十忽為一絲十絲為一毫又論嘉量引孫子算術六粟為圭十圭為抄十抄為撮十撮為勺十勺為合本書乃作十圭為一撮十撮為一抄十抄為一勺考之夏侯陽算經引田曹倉曹亦如本書而隋書中所引與史傳往往多合蓋古書傳本不一校訂之儒各有據證無妨參差互見也唐之選舉算學凡十書孫子五曹共限一嵗習肄于後來諸算術中特為近古第不知孫子何許人朱彞尊集五曹算經跋云相傳其法出于孫武然孫子别有算經考古者存其説可爾又有孫子算經跋云首言度量所起合乎兵法地生度度生量量生數之文次言乘除之法設為之數十三篇中所云廓地分利委積逺輸貴賣兵役分數比之九章方田粟米差分商功均輸盈不足之目往往相符而要在得算多多算勝以是知此編非偽託也彞尊之意蓋以為確出于孫武今考書內設問有云長安洛陽相去九百里又云佛書二十九章章六十三字則後漢明帝以後人語孫武春秋末人安有是語乎舊本久佚今從永樂大典所載裒集編次仍為三卷冠以原序其甄李二家之注則不可復考是則姚廣孝等割裂刊削之過矣乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ef88a7bcfef2f7bd411d6706875e5c3d5346db7dd3e771714f5de162d47b1aae
